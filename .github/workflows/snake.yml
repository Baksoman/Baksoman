name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Baksoman
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#E29A5A&color_dots=#161B22,#0E4429,#006D32,#26A641,#39FF14
            dist/github-contribution-grid-snake-dark.svg?color_snake=#E29A5A&color_dots=#161B22,#0E4429,#006D32,#26A641,#39FF14
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
